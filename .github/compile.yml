name: Compile FG BIOS

on: [push] # Запускати при кожному збереженні коду

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Compile Assembly to Binary
        run: nasm -f bin boot.asm -o fgbios.bin

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fgbios-binary
          path: fgbios.bin